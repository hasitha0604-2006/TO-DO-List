<!DOCTYPE html>
<html>
<head>
    <title>TO-DO List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            width: 500px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        .icon {
            font-size: 30px;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        .add-btn {
            background: #28a745;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f8f8;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .delete-btn {
            background: red;
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .check {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>
        <span class="icon">📝</span>
        TO-DO List
    </h1>

    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Enter a task..." required>
        <button class="add-btn">Add</button>
    </form>

    <ul>
    {% for task in tasks %}
    <li>

        <span class="{% if task.completed %}completed{% endif %}">
            {{ task.text }}
        </span>

        <div class="actions">

            <a href="/toggle/{{ loop.index0 }}">
                <input
                    type="checkbox"
                    class="check"
                    {% if task.completed %}checked{% endif %}
                    onclick="this.parentElement.click();"
                >
            </a>

            <a href="/delete/{{ loop.index0 }}" class="delete-btn">
                Remove
            </a>

        </div>

    </li>
    {% endfor %}
</ul>

</div>

</body>
</html>
